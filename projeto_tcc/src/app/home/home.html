<div class="container">

  <h2>Login</h2>

  <div class="form-group">
    <label>E-mail</label>
    <input type="email" [(ngModel)]="email" placeholder="Digite seu e-mail">
  </div>

  <div class="form-group">
    <label>Senha</label>
    <input type="password" [(ngModel)]="senha" placeholder="Digite sua senha">
  </div>

  <button class="btn" (click)="login()">Entrar</button>
  <button class="btn" (click)="cadastrar()">Cadastrar</button>

  <p class="link">
    <br> Não tem conta? <a routerLink="/cadastro">Cadastre-se</a>
  </p>

</div>
